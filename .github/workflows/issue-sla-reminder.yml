name: Issue SLA Reminder

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      sla_days:
        description: "SLA threshold in days for unanswered bug issues"
        required: false
        default: "5"
        type: string

permissions:
  issues: write

env:
  DEFAULT_SLA_DAYS: "5"

jobs:
  remind-unanswered-bugs:
    runs-on: ubuntu-latest
    steps:
      - name: Mark and remind unanswered bug issues
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const dispatchSla = context.payload.inputs?.sla_days;
            const configuredSla = dispatchSla ?? process.env.DEFAULT_SLA_DAYS ?? "5";
            const slaDays = Number(configuredSla);

            if (!Number.isFinite(slaDays) || slaDays <= 0) {
              core.setFailed(`Invalid SLA value: "${configuredSla}". Use a positive number.`);
              return;
            }

            const now = Date.now();
            const marker = "<!-- sla-unanswered-bug-reminder -->";
            const waitingLabel = "status: нужен ответ";

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description,
                  });
                } else {
                  throw error;
                }
              }
            }

            await ensureLabel(waitingLabel, "D93F0B", "Issue ожидает ответа мейнтейнера");

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "type: проблема",
              per_page: 100,
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issue.number,
                per_page: 100,
              });

              const hasMaintainerReply = comments.some((c) =>
                ["OWNER", "MEMBER", "COLLABORATOR"].includes(c.author_association),
              );
              if (hasMaintainerReply) continue;

              const nonMaintainerTimestamps = [
                new Date(issue.created_at).getTime(),
                ...comments
                  .filter((c) => !["OWNER", "MEMBER", "COLLABORATOR"].includes(c.author_association))
                  .map((c) => new Date(c.created_at).getTime()),
              ];
              const lastNonMaintainerActivity = Math.max(...nonMaintainerTimestamps);
              const inactivityDays = (now - lastNonMaintainerActivity) / (1000 * 60 * 60 * 24);
              if (inactivityDays < slaDays) continue;

              const labelNames = (issue.labels || []).map((l) => l.name);
              if (!labelNames.includes(waitingLabel)) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issue.number,
                  labels: [waitingLabel],
                });
              }

              const reminderExists = comments.some(
                (c) =>
                  c.user?.type === "Bot" &&
                  typeof c.body === "string" &&
                  c.body.includes(marker),
              );
              if (reminderExists) continue;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `${marker}
                Напоминание по SLA: в issue пока нет ответа мейнтейнера.

                Спасибо за терпение. Мы вернемся с ответом при первой возможности.
                Чтобы ускорить triage, можно дополнить issue:
                - версией TG WS Proxy;
                - логами/текстом ошибки;
                - шагами воспроизведения.`,
              });
            }
