name: ❓ Вопрос / Поддержка
title: '[Вопрос] '
description: Задать вопрос по настройке или работе TG WS Proxy
labels: ['type: вопрос', 'status: нуждается в сортировке']

body:
  - type: dropdown
    id: os
    attributes:
      label: Операционная система
      description: На какой ОС возник вопрос?
      options:
        - Windows
        - macOS
        - Linux
        - Другая
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: Версия TG WS Proxy
      description: Укажите версию приложения (если знаете)
      placeholder: vX.Y.Z
    validations:
      required: false

  - type: textarea
    id: question
    attributes:
      label: Ваш вопрос
      description: Кратко опишите, что именно не получается или непонятно
      placeholder: |
        Что вы хотите сделать?
        На каком шаге возник вопрос?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: Что уже пробовали
      description: Перечислите, какие действия уже выполнили
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: additions
    attributes:
      label: Дополнительные детали
      description: Прикрепите логи, скриншоты или текст ошибок, если это применимо
      placeholder: Любая дополнительная информация
