name: 🚀 Предложение
title: '[Предложение] '
description: Предложить улучшение или новую функциональность
labels: ['type: предложение', 'status: нуждается в сортировке']

body:
  - type: textarea
    id: problem
    attributes:
      label: Какую проблему решает предложение?
      description: Опишите текущую боль или ограничение, с которым вы столкнулись
      placeholder: |
        Сейчас ...
        Это неудобно, потому что ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Предлагаемое решение
      description: Опишите, как именно вы предлагаете улучшить проект
      placeholder: |
        Предлагаю добавить ...
        Это позволит ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Рассмотренные альтернативы
      description: Опишите альтернативные варианты, если вы их рассматривали
      placeholder: |
        Вариант 1 ...
        Вариант 2 ...
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Для какой платформы актуально?
      description: Выберите платформу, если предложение связано с конкретной ОС
      options:
        - Все платформы
        - Windows
        - macOS
        - Linux
        - Другое
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Дополнительный контекст
      description: Добавьте примеры, ссылки, скриншоты или другие детали
      placeholder: Любые дополнительные материалы по предложению
